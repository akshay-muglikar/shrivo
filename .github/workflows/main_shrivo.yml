name: Build and deploy Python app to Azure Web App - shrivo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create Deployment Zip
        run: |
          cd backend
          # We zip everything EXCEPT the virtual environment
          zip -r ../release.zip . -x "antenv/*" "venv/*" "__pycache__/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_ADD022495007407AB6D8A26405AE3BAE }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FAB1CE8EC43490885883F59EB3CABB5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7ED691047D124FD5AA7945749FC15812 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shrivo'
          slot-name: 'Production'
          # Pointing directly to the zip file avoids the OneDeploy folder sync issues
          package: release.zip
